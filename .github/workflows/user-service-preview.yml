# =============================================================================
# User Service — PR Preview Environment
# =============================================================================
name: "Backend: PR Preview User Service"

on:
  pull_request:
    types: [labeled]
    paths:
      - "web-app/ecommerce-microservices/services/user-service/**"

jobs:
  preview:
    uses: ./.github/workflows/_reusable-preview.yml
    with:
      service-name: user-service
      service-path: web-app/ecommerce-microservices/services/user-service
      docker-image-name: webapp-user-service
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
