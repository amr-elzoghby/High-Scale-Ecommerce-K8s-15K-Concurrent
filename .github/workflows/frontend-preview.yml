# =============================================================================
# Frontend — PR Preview Environment
# =============================================================================
name: "Frontend: PR Preview"

on:
  pull_request:
    types: [labeled]
    paths:
      - "web-app/frontend/**"

jobs:
  preview:
    uses: ./.github/workflows/_reusable-preview.yml
    with:
      service-name: frontend
      service-path: web-app/frontend
      docker-image-name: webapp-frontend
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
