# =============================================================================
# Cart Service — Build & Deploy to AWS EKS (GitOps Version)
# =============================================================================
name: "Backend: Deploy Cart Service"

on:
  push:
    branches: ["main"]
    paths:
      - "web-app/ecommerce-microservices/services/cart-service/**"

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      service-name: cart-service
      service-path: web-app/ecommerce-microservices/services/cart-service
      ecr-repository: prod-cart-service
      gitops-app-path: apps/cart-service/deployment.yaml
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
