# =============================================================================
# Payment Service — PR Preview Environment
# =============================================================================
name: "Backend: PR Preview Payment Service"

on:
  pull_request:
    types: [labeled]
    paths:
      - "web-app/ecommerce-microservices/services/payment-service/**"

jobs:
  preview:
    uses: ./.github/workflows/_reusable-preview.yml
    with:
      service-name: payment-service
      service-path: web-app/ecommerce-microservices/services/payment-service
      docker-image-name: webapp-payment-service
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
