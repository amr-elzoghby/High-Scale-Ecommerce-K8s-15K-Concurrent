# =============================================================================
# Catalog Service — Build & Deploy to AWS EKS (GitOps Version)
# =============================================================================
name: "Backend: Deploy Catalog Service"

on:
  push:
    branches: ["main"]
    paths:
      - "web-app/ecommerce-microservices/services/catalog-service/**"

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      service-name: catalog-service
      service-path: web-app/ecommerce-microservices/services/catalog-service
      ecr-repository: prod-catalog-service
      gitops-app-path: apps/catalog-service/deployment.yaml
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
