# =============================================================================
# Catalog Service — PR Preview Environment
# =============================================================================
name: "Backend: PR Preview Catalog Service"

on:
  pull_request:
    types: [labeled]
    paths:
      - "web-app/ecommerce-microservices/services/catalog-service/**"

jobs:
  preview:
    uses: ./.github/workflows/_reusable-preview.yml
    with:
      service-name: catalog-service
      service-path: web-app/ecommerce-microservices/services/catalog-service
      docker-image-name: webapp-catalog-service
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
