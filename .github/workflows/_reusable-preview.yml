# =============================================================================
# Reusable Workflow — PR Preview Environment for any service
# Called by individual per-service preview workflows.
# =============================================================================
name: "_Reusable: PR Preview Environment"

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service (e.g. cart-service, frontend)"
        required: true
        type: string
      service-path:
        description: "Path to the service source code relative to repo root"
        required: true
        type: string
      docker-image-name:
        description: "Docker Hub image name suffix (e.g. webapp-cart-service)"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true
      GITOPS_TOKEN:
        required: true

jobs:
  build-and-preview:
    if: github.event.label.name == 'pr-deploy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.service-path }}
          file: ./${{ inputs.service-path }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.docker-image-name }}:${{ env.IMAGE_TAG }}

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: 3MR-MLops/web-app-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-folder

      - name: Create Temporary Manifest
        run: |
          cd gitops-folder
          cp deployment.yaml deployment-${{ inputs.service-name }}-${{ env.IMAGE_TAG }}.yaml
          # Update tag while preserving indentation
          sed -i '/image: ${{ inputs.docker-image-name }}/{n;s/\(tag: \).*/\1"${{ env.IMAGE_TAG }}"/}' deployment-${{ inputs.service-name }}-${{ env.IMAGE_TAG }}.yaml

      - name: Push to GitOps Repo
        run: |
          cd gitops-folder
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add deployment-${{ inputs.service-name }}-${{ env.IMAGE_TAG }}.yaml
            git commit -m "Deploy ${{ inputs.service-name }} preview for ${{ env.IMAGE_TAG }}"
            git push
          else
            echo "No changes to commit"
          fi
