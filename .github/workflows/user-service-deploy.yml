# =============================================================================
# User Service — Build & Deploy to AWS EKS (GitOps Version)
# =============================================================================
name: "Backend: Deploy User Service"

on:
  push:
    branches: ["main"]
    paths:
      - "web-app/ecommerce-microservices/services/user-service/**"

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      service-name: user-service
      service-path: web-app/ecommerce-microservices/services/user-service
      ecr-repository: prod-user-service
      gitops-app-path: apps/user-service/deployment.yaml
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
