# =============================================================================
# Payment Service — Build & Deploy to AWS EKS (GitOps Version)
# =============================================================================
name: "Backend: Deploy Payment Service"

on:
  push:
    branches: ["main"]
    paths:
      - "web-app/ecommerce-microservices/services/payment-service/**"

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      service-name: payment-service
      service-path: web-app/ecommerce-microservices/services/payment-service
      ecr-repository: prod-payment-service
      gitops-app-path: apps/payment-service/deployment.yaml
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
