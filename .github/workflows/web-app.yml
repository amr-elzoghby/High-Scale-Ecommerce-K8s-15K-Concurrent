name: Deploy Frontend

on:
  push:
    branches:
      - main  
    paths:
      - 'web-app/ecommerce-microservices/frontend/**'  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
  
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./web-app/ecommerce-microservices/frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/webapp-frontend:latest

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1  

    - name: Deploy to EC2 via SSM
      run: |
        aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=tag:Name,Values=web-server" \
          --parameters 'commands=["cd /home/ubuntu/ecommerce-microservices", "sudo docker-compose pull nginx", "sudo docker-compose up -d nginx"]'