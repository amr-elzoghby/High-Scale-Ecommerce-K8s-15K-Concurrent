# =============================================================================
# Frontend — Build & Deploy to Production (GitOps Version)
# =============================================================================
name: "Frontend: Deploy Service"

on:
  push:
    branches: ["main"]
    paths:
      - "web-app/frontend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Image to Docker Hub
        env:
          DOCKER_REPO: 3mrlmlops/webapp-frontend
          IMAGE_TAG: v${{ github.run_number }}
        run: |
          docker build -t $DOCKER_REPO:$IMAGE_TAG ./web-app/frontend
          docker push $DOCKER_REPO:$IMAGE_TAG

      - name: Update GitOps Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone the GitOps repo
          git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/amr-elzoghby/web-app-gitops.git gitops-repo
          cd gitops-repo
          
          # Target file in the new structure
          TARGET_FILE="apps/frontend/deployment.yaml"
          IMAGE_NAME="3mrlmlops/webapp-frontend"
          NEW_TAG="v${{ github.run_number }}"
          
          # Update the image line - finding the line with 'image:' and replacing it
          sed -i "s|image: .*|image: $IMAGE_NAME:$NEW_TAG|g" $TARGET_FILE
          
          # Check for changes and push
          if [ -n "$(git status --porcelain)" ]; then
            git add $TARGET_FILE
            git commit -m "chore: update frontend to $NEW_TAG [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
