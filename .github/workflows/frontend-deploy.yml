# =============================================================================
# Frontend — Build & Deploy to AWS EKS (GitOps Version)
# =============================================================================
name: "Frontend: Deploy Service"

on:
  push:
    branches: ["main"]
    paths:
      - "web-app/frontend/**"

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      service-name: frontend
      service-path: web-app/frontend
      ecr-repository: prod-frontend
      gitops-app-path: apps/frontend/deployment.yaml
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
