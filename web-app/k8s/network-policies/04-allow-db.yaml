# Allow specific apps to communicate with MongoDB
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-mongo
  namespace: ecommerce-data
spec:
  podSelector:
    matchLabels:
      app: mongodb
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ecommerce-apps
      podSelector:
        matchExpressions:
          - key: app
            operator: In
            values: [user-service, catalog-service, cart-service, order-service]
    ports:
    - protocol: TCP
      port: 27017
---
# Allow specific apps to communicate with PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-postgres
  namespace: ecommerce-data
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ecommerce-apps
      podSelector:
        matchLabels:
          app: payment-service
    ports:
    - protocol: TCP
      port: 5432
---
# Allow specific apps to communicate with Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-redis
  namespace: ecommerce-data
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ecommerce-apps
      podSelector:
        matchLabels:
          app: cart-service
    ports:
    - protocol: TCP
      port: 6379
