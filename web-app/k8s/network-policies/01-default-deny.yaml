# Default Deny all traffic in ecommerce-apps
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ecommerce-apps
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Default Deny all traffic in ecommerce-data
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ecommerce-data
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
