apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce-apps      
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      imagePullSecrets:
        - name: regcred
      nodeSelector:
        role: apps
      containers:
        - name: order-service
          image: 644981759771.dkr.ecr.us-east-1.amazonaws.com/order-service:latest
          ports:
            - containerPort: 3004
              name: http
            - containerPort: 50052
              name: grpc
          env:
            - name: PORT
              value: "3004"
            - name: GRPC_PORT
              value: "50052"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_PUBLIC_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce-apps
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 3004
      targetPort: 3004
    - name: grpc
      port: 50052
      targetPort: 50052
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: ecommerce-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
