---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cart-service
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: cart-service
  namespaceSelector:
    matchNames:
      - ecommerce-apps
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
